# render.yaml — WEP AI (versión de PRUEBA en plan gratis)
# OJO: sin disco, las cuentas se borran cuando el servicio se duerme/reinicia.
# Para un servicio real: cambia "plan: free" por "plan: starter" y vuelve a
# agregar el bloque "disk:".

services:
  - type: web
    name: wepai
    runtime: python
    region: oregon
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "cd web && uvicorn server:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: WEPAI_DB_PATH
        value: /tmp/wepai.db
      - key: WEPAI_SECRET_KEY
        generateValue: true
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: "3.11.9"
